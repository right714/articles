name: "AI Review"
on:
  pull_request:
    types:
      - opened
    paths:
      - articles/*.md
      - books/**/*.md

jobs:
  get-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      files: ${{ steps.normalize.outputs.files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            articles/**
            books/**
          json: true

      - name: Normalize files output
        id: normalize
        run: echo "files=${{ steps.changed-files.outputs.all_changed_files_json || '[]' }}" >> $GITHUB_OUTPUT

  review:
    needs: get-files
    if: needs.get-files.outputs.any_changed == 'true'
    strategy:
      matrix:
        file: ${{ fromJson(needs.get-files.outputs.files) }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Run textlint
        run: |
          npx textlint --format compact "${{ matrix.file }}" > /tmp/textlint-result.txt 2>&1 || true

      - name: Create prompt
        run: |
          {
            echo "## 記事内容"
            echo ""
            cat "${{ matrix.file }}"
            echo ""
            echo "## textlint実行結果"
            echo ""
            cat /tmp/textlint-result.txt
          } > /tmp/prompt.md

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Inference
        id: inference
        uses: actions/ai-inference@17ff458cb182449bbb2e43701fcd98f6af8f6570 # v2.1.0
        with:
          provider: copilot
          model: gpt-4.1
          max-completion-tokens: 2000
          system-prompt-file: ".github/review-prompt.md"
          prompt-file: "/tmp/prompt.md"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Comment on PullRequest
        env:
          RESPONSE: ${{ steps.inference.outputs.response }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Review: \`${{ matrix.file }}\`"
            echo "$RESPONSE"
          } > /tmp/comment
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment
