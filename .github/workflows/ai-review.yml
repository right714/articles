name: "AI Review"

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - articles/*.md
      - books/**/*.md
  issue_comment:
    types:
      - created

jobs:
  prepare:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request.url != '' &&
        contains(github.event.comment.body, '/ai-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      files: ${{ steps.output.outputs.files }}
      any_changed: ${{ steps.output.outputs.any_changed }}
      pr_number: ${{ steps.output.outputs.pr_number }}
      head_sha: ${{ steps.output.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files (PR trigger)
        if: github.event_name == 'pull_request'
        id: pr-changed-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^(articles|books)/.*\.md$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Get changed files (Comment trigger)
        if: github.event_name == 'issue_comment'
        id: comment-changed-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_DATA=$(gh pr view "$PR_NUMBER" --json headRefOid,files)
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          FILES=$(echo "$PR_DATA" | jq -c '[.files[].path | select(test("^(articles|books)/.*\\.md$"))]')
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Set output
        id: output
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_FILES_PR: ${{ steps.pr-changed-files.outputs.files }}
          PR_FILES_COMMENT: ${{ steps.comment-changed-files.outputs.files }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          PR_NUMBER_COMMENT: ${{ github.event.issue.number }}
          HEAD_SHA_PR: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA_COMMENT: ${{ steps.comment-changed-files.outputs.head_sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            FILES="$PR_FILES_PR"
            PR_NUMBER="$PR_NUMBER_PR"
            HEAD_SHA="$HEAD_SHA_PR"
          else
            FILES="$PR_FILES_COMMENT"
            PR_NUMBER="$PR_NUMBER_COMMENT"
            HEAD_SHA="$HEAD_SHA_COMMENT"
          fi
          if [ -z "$FILES" ] || [ "$FILES" = "[]" ] || [ "$FILES" = "null" ]; then
            echo 'files=["__no_files__"]' >> $GITHUB_OUTPUT
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "files=$FILES" >> $GITHUB_OUTPUT
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

  review:
    needs: prepare
    if: needs.prepare.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.prepare.outputs.files) }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Run textlint
        run: |
          npx textlint --format compact "${{ matrix.file }}" > /tmp/textlint-result.txt 2>&1 || true

      - name: Create prompt
        run: |
          {
            echo "## 記事内容"
            echo ""
            cat "${{ matrix.file }}"
            echo ""
            echo "## textlint実行結果"
            echo ""
            cat /tmp/textlint-result.txt
          } > /tmp/prompt.md

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: AI Inference
        id: inference
        uses: actions/ai-inference@v2
        with:
          provider: copilot
          model: gpt-4.1
          max-completion-tokens: 2000
          system-prompt-file: ".github/review-prompt.md"
          prompt-file: "/tmp/prompt.md"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Comment on PR
        env:
          RESPONSE: ${{ steps.inference.outputs.response }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Review: \`${{ matrix.file }}\`"
            echo ""
            echo "$RESPONSE"
          } > /tmp/comment
          gh pr comment "${{ needs.prepare.outputs.pr_number }}" -F /tmp/comment
