name: "AI Review"

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - articles/*.md
      - books/**/*.md
  issue_comment:
    types:
      - created

jobs:
  prepare:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request.url != '' &&
        contains(github.event.comment.body, '/ai-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      files: ${{ steps.output.outputs.files }}
      any_changed: ${{ steps.output.outputs.any_changed }}
      pr_number: ${{ steps.output.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files (PR trigger)
        if: github.event_name == 'pull_request'
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            articles/*.md
            books/**/*.md
          json: true

      - name: Get changed files (Comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path' \
            | grep -E '^(articles|books).*\.md$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Set output
        id: output
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FILES='${{ steps.changed-files.outputs.all_changed_files }}'
            ANY='${{ steps.changed-files.outputs.any_changed }}'
            PR='${{ github.event.pull_request.number }}'
          else
            FILES='${{ steps.pr-files.outputs.files }}'
            PR='${{ github.event.issue.number }}'
            if [ -z "$FILES" ] || [ "$FILES" = "[]" ] || [ "$FILES" = "null" ]; then
              ANY="false"
            else
              ANY="true"
            fi
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "any_changed=$ANY" >> $GITHUB_OUTPUT
          echo "pr_number=$PR" >> $GITHUB_OUTPUT

  review:
    needs: prepare
    if: needs.prepare.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.prepare.outputs.files) }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Run textlint
        run: |
          npx textlint --format compact "${{ matrix.file }}" > /tmp/textlint-result.txt 2>&1 || true

      - name: Create prompt
        run: |
          {
            echo "## 記事内容"
            echo ""
            cat "${{ matrix.file }}"
            echo ""
            echo "## textlint実行結果"
            echo ""
            cat /tmp/textlint-result.txt
          } > /tmp/prompt.md

      - name: AI Inference
        id: inference
        uses: actions/ai-inference@v2
        with:
          provider: copilot
          model: gpt-4.1
          max-completion-tokens: 2000
          system-prompt-file: ".github/review-prompt.md"
          prompt-file: "/tmp/prompt.md"
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Comment on PR
        env:
          RESPONSE: ${{ steps.inference.outputs.response }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Review: \`${{ matrix.file }}\`"
            echo ""
            echo "$RESPONSE"
          } > /tmp/comment
          gh pr comment "${{ needs.prepare.outputs.pr_number }}" -F /tmp/comment
